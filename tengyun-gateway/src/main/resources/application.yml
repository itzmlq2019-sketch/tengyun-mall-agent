server:
  port: 8080 # 网关作为统一入口，占领最经典的 8080 端口
spring:
  application:
    name: gateway-service # 网关自己的名字
  cloud:
    nacos:
      discovery:
        server-addr: 10.177.3.189:8848 # 去敲 Nacos 的门
    gateway:
      routes:
        - id: user-route
          uri: lb://user-service
          predicates:
            - Path=/user/**

        #新增订单服务的路由
        - id: order-route
          uri: lb://order-service
          predicates:
            - Path=/order/**

        - id: product-route
          uri: lb://product-service
          predicates:
            - Path=/product/**
        - id: cart-route
          uri: lb://cart-service
          predicates:
            - Path=/cart/**